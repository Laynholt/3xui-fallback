events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    server_tokens off;

    upstream panel_backend_upstream {
        server ${PANEL_BACKEND_HOST}:${PANEL_BACKEND_PORT};
    }

    upstream subs_backend_upstream {
        server ${SUBS_BACKEND_HOST}:${SUBS_BACKEND_PORT};
    }

    server {
        listen ${PANEL_HTTPS_PORT} ssl;
        http2 on;
        server_name ${SITE_DOMAIN};

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        access_log /var/log/nginx/panel_access.log;
        error_log  /var/log/nginx/panel_error.log warn;

        proxy_intercept_errors on;
        error_page 400 /400.html;
        error_page 401 /401.html;
        error_page 403 /403.html;
        error_page 404 /404.html;
        error_page 405 /405.html;
        error_page 500 /500.html;
        error_page 502 /502.html;
        error_page 503 /503.html;
        error_page 504 /504.html;

        location ~ ^${PANEL_PATH_PREFIX}(/.*)?$ {
            set $panel_upstream_uri $request_uri;

            if ($uri = ${PANEL_PATH_PREFIX}) {
                set $panel_upstream_uri ${PANEL_PATH_PREFIX}/$is_args$args;
            }

            proxy_pass http://panel_backend_upstream$panel_upstream_uri;
            proxy_http_version 1.1;
            proxy_redirect ~^https?://[^/]+(/.*)$ https://$http_host$1;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location / {
            return 404;
        }

        location = /error-pages.css {
            root /usr/share/nginx/html;
        }

        location ~ ^/(400|401|403|404|405|500|502|503|504)\.html$ {
            root /usr/share/nginx/html;
            internal;
        }
    }

    server {
        listen ${SUBS_HTTPS_PORT} ssl;
        http2 on;
        server_name ${SITE_DOMAIN};

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        access_log /var/log/nginx/subs_access.log;
        error_log  /var/log/nginx/subs_error.log warn;

        proxy_intercept_errors on;
        error_page 400 /400.html;
        error_page 401 /401.html;
        error_page 403 /403.html;
        error_page 404 /404.html;
        error_page 405 /405.html;
        error_page 500 /500.html;
        error_page 502 /502.html;
        error_page 503 /503.html;
        error_page 504 /504.html;

        location ~ ^${SUBS_PATH_PREFIX}/[^/]+/?$ {
            proxy_pass http://subs_backend_upstream;
            proxy_http_version 1.1;
            proxy_redirect ~^https?://[^/]+(/.*)$ https://$http_host$1;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location / {
            return 404;
        }

        location = /error-pages.css {
            root /usr/share/nginx/html;
        }

        location ~ ^/(400|401|403|404|405|500|502|503|504)\.html$ {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
