<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 Internal Server Error</title>
  <link rel="stylesheet" href="./error-pages.css" />
</head>
<body class="theme-server">
  <div class="scene" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
    <div class="noise"></div>
  </div>

  <main class="card">
    <div class="eyebrow">Server Error</div>
    <h1>500</h1>
    <p class="subtitle">Внутренняя ошибка сервера</p>
    <p>На стороне сервиса произошла непредвиденная ошибка, и запрос не удалось завершить корректно.</p>
    <div class="status">Попробуйте повторить запрос позже. Если ошибка сохраняется, проверьте backend-логи.</div>
  </main>
</body>
</html>
