<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>503 Service Unavailable</title>
  <link rel="stylesheet" href="./error-pages.css" />
</head>
<body class="theme-server">
  <div class="scene" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
    <div class="noise"></div>
  </div>

  <main class="card">
    <div class="eyebrow">Server Error</div>
    <h1>503</h1>
    <p class="subtitle">Сервис временно недоступен</p>
    <p>Сервер сейчас не может обработать запрос: сервис перегружен, остановлен или находится на обслуживании.</p>
    <div class="status">Подождите немного и повторите запрос позже.</div>
  </main>
</body>
</html>
