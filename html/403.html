<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>403 Forbidden</title>
  <link rel="stylesheet" href="./error-pages.css" />
</head>
<body class="theme-client">
  <div class="scene" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
    <div class="grid"></div>
  </div>

  <main class="card">
    <div class="eyebrow">Client Error</div>
    <h1>403</h1>
    <p class="subtitle">Доступ запрещен</p>
    <p>Сервер понял запрос, но не разрешает доступ к ресурсу для текущего пользователя, токена или IP-адреса.</p>
    <div class="status">Проверьте права доступа или используйте учетную запись с нужными разрешениями.</div>
  </main>
</body>
</html>
