<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found</title>
  <link rel="stylesheet" href="./error-pages.css" />
</head>
<body class="theme-client">
  <div class="scene" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
    <div class="grid"></div>
  </div>

  <main class="card">
    <div class="eyebrow">Client Error</div>
    <h1>404</h1>
    <p class="subtitle">Страница не найдена</p>
    <p>Ресурс по этому адресу не существует, был перемещен или путь указан с ошибкой.</p>
    <div class="status">Проверьте URL и попробуйте открыть нужный раздел заново.</div>
  </main>
</body>
</html>
